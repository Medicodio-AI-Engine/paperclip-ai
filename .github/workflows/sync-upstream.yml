name: Sync upstream master

# Every 3 days: pull upstream commits into this fork (native merge-upstream API),
# and if anything actually merged, poke Jenkins to start the deploy pipeline.
# merge-upstream needs a PAT with `workflow` scope (secret SYNC_PAT) because the
# built-in GITHUB_TOKEN is forbidden from updating .github/workflows/* files.

on:
  schedule:
    - cron: '0 3 */3 * *'      # every 3 days at 03:00 UTC (~08:30 IST)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork master from upstream
        id: sync
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}   # PAT with `workflow` scope
        run: |
          set -e
          RESP=$(gh api --method POST -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/merge-upstream" -f branch=master)
          echo "$RESP"
          MT=$(echo "$RESP" | jq -r '.merge_type // "none"')
          echo "merge_type=$MT" >> "$GITHUB_OUTPUT"
          echo "merge_type = $MT"

      - name: Trigger Jenkins deploy (only when sync succeeded AND new commits merged)
        if: ${{ success() && steps.sync.outputs.merge_type != 'none' }}
        env:
          JENKINS_TOKEN:       ${{ secrets.JENKINS_TOKEN }}        # Jenkins user API token (user: dev-team)
          JENKINS_BUILD_TOKEN: ${{ secrets.JENKINS_BUILD_TOKEN }}  # the "Trigger builds remotely" token
        run: |
          set -e
          echo "New commits merged -> triggering Jenkins deploy..."
          curl -fsS -X POST \
            "https://ci.medicodio.com/job/Paperclip%20Deploy/build?token=${JENKINS_BUILD_TOKEN}" \
            --user "dev-team:${JENKINS_TOKEN}"
          echo "Jenkins deploy triggered."
