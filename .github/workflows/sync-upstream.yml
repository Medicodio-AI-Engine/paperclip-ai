name: Sync upstream master

# Pulls commits from the official upstream repo into THIS fork's master, every 3 days.
# Lives in the fork at: .github/workflows/sync-upstream.yml
#
# Uses GitHub's NATIVE fork-sync ("merge-upstream" API) — the same thing the green
# "Sync fork → Update branch" button does. Runs server-side, so it's allowed to update
# .github/workflows/* files (a raw git push with GITHUB_TOKEN is NOT). No PAT needed.

on:
  schedule:
    - cron: '0 3 */3 * *'      # every 3 days at 03:00 UTC (~08:30 IST). GitHub cron is UTC.
  workflow_dispatch: {}         # manual "Run workflow" button

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork master from upstream (native merge-upstream)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Syncing ${{ github.repository }}:master from upstream..."
          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/merge-upstream" \
            -f branch=master
          echo "Sync done."
